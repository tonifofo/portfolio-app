name: My first pipeline
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: | 
            docker build -t ${{secrets.DOCKER_USERNAME}}/web3-portfolio:${{github.run_number}} .
            docker build -t ${{secrets.DOCKER_USERNAME}}/web3-portfolio .



      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: push image to registry
        run: |
            
            docker push ${{secrets.DOCKER_USERNAME}}/web3-portfolio:${{github.run_number}}
            docker push ${{secrets.DOCKER_USERNAME}}/web3-portfolio
        


