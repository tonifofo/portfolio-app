name: My first pipeline
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: | 
            docker build -t ${{secrets.DOCKER_USERNAME}}/web3-portfolio:${{github.run_number}} .
            docker build -t ${{secrets.DOCKER_USERNAME}}/web3-portfolio .



      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: push image to registry
        run: |
            
            docker push ${{secrets.DOCKER_USERNAME}}/web3-portfolio:${{github.run_number}}
            docker push ${{secrets.DOCKER_USERNAME}}/web3-portfolio
        
  deploy: 
        needs: build
        runs-on: ubuntu-latest
        steps:
          - name: SSH to Linux server and run container
            uses: appleboy/ssh-action@v1
            with:
              host: ${{ secrets.HOST }}
              username: ${{ secrets.SSH_USERNAME }}
              key: ${{ secrets.PUBLIC_KEY }}
              
              script: |
                docker rm -f web3-portfolio || echo "Container not found, skipping removal."
                docker rmi -f ${{secrets.DOCKER_USERNAME}}/web3-portfolio || echo "Image not exist"
                docker run -d --name web3-portfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/web3-portfolio 
            